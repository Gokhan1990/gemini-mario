name: Voice-to-Deploy Auto Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # Her 5 dakikada bir otomatik tetikleme

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v4

      - name: Google Docs'tan Kodu Saf Metin Olarak Çek
        run: |
          curl -L "https://docs.google.com/document/export?format=txt&id=${{ secrets.DRIVE_FILE_ID }}" -o index.html

      - name: Değişiklikleri GitHub'a Push Et
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Google Docs üzerinden otomatik kod güncellemesi" || echo "Değişecek bir şey yok"
          git pull --rebase origin main
          git push
          
